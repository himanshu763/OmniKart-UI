name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─────────────────────────────────────────────────────────
#  JOB 1 — Lint
# ─────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint


# ─────────────────────────────────────────────────────────
#  JOB 2 — Build & push Docker image
# ─────────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: meta
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max


# ─────────────────────────────────────────────────────────
#  JOB 3 — Deploy frontend to EC2
# ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Deploy frontend to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            mkdir -p ~/market-sentinel
            cd ~/market-sentinel

            # Upsert FRONTEND_IMAGE in .env — add line if missing, replace if present
            if [ -f .env ] && grep -q "^FRONTEND_IMAGE=" .env; then
              sed -i "s|^FRONTEND_IMAGE=.*|FRONTEND_IMAGE=${{ needs.build.outputs.image }}:${{ github.sha }}|" .env
            else
              echo "FRONTEND_IMAGE=${{ needs.build.outputs.image }}:${{ github.sha }}" >> .env
            fi

            # Always fetch the latest prod compose so frontend config stays in sync
            curl -fsSL https://raw.githubusercontent.com/himanshu763/Market-Sentinel/master/docker-compose.prod.yml \
              -o docker-compose.prod.yml

            # Login to GHCR and pull the new frontend image
            echo "${{ secrets.GITHUB_TOKEN }}" \
              | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.prod.yml pull frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps frontend

            docker image prune -f
