server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* requests to the Spring Boot backend.
    # "app" resolves via Docker's internal DNS to the backend container.
    # This means the browser never talks cross-origin — no CORS needed.
    location /api/ {
        proxy_pass         http://app:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # SPA fallback — all routes serve index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }
}
